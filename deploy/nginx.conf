server {
    listen 80;
    listen [::]:80;
    server_name translate.nohentai.com;

    root /var/www/manga-trans/dist;
    index index.html;

    # 代理路由转发给 Node.js proxy-server
    location ~ ^/(api|paddleocr-fast-proxy|paddleocr-proxy|bcebos-proxy|ehentai-proxy|exhentai-proxy|img-proxy) {
        proxy_pass          http://127.0.0.1:3001;
        proxy_http_version  1.1;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;

        # 透传自定义 Header（EH cookie 注入用）
        proxy_pass_request_headers on;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_buffers       8 32k;
        proxy_buffer_size   64k;

        # 允许较大响应（图片代理）
        proxy_max_temp_file_size 0;
    }

    # SPA fallback — 所有非文件路径返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源长缓存
    location ~* \.(js|css|wasm|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 安全头
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header Referrer-Policy         no-referrer;
}
